# Seeds template — copy to data/brands/<slug>/seeds.yaml and fill in.
# trend-scout reads this file for Trend Research Run parameters.

# Peer / competitor Pages to scrape for trending content. This legacy Brand-level copy is not the
# source of truth for a Run's sources anymore (that's the Format file — formats/unhypped-news.yaml,
# ADR-0013); kept here for onboarding/readiness. Instagram and YouTube actors are now wired (issue
# #48), so these ARE scrapable once a Format's sources.mode is switched to "peer" (an Operator/
# editorial decision — unhypped-news.yaml stays in curated mode today).
seed_pages:
  - https://www.instagram.com/evolving.ai/
  - https://www.instagram.com/theaifield/
  - https://www.youtube.com/@curiousrefuge

# Curated newsletter sources for the "Unhypped News" format: fully public archives (no login/paywall)
# that the Operator already curates and prioritizes. When this list is non-empty, trend-scout digests
# these instead of scraping peer Pages via Apify — see .claude/agents/trend-scout.md.
curated_sources:
  - https://ai-weekly.ai/
  - https://newsletter.evolvingai.io/

# Optional keyword augmentation for topic search.
keywords: []

language: en
region: "US"
lookback_days: 7 # Only consider peer posts from the last N days
format_focus: reel # Target format: reel | image | carousel
ideas_per_run: 10 # How many Idea briefs to suggest per Run
overperformance_only: true # Only mine peer posts beating their OWN page baseline

# Apify actors, keyed by platform. trend-scout resolves the platform per SOURCE URL (this Brand's
# Channel is Facebook, but its recorded competitors above are Instagram/YouTube — see
# src/apify/platform.ts); performance-tracker resolves the platform from each logged post_url.
# Facebook, Instagram, and YouTube are wired (verified live — issue #48); LinkedIn is roadmap.
apify:
  facebook:
    trends_actor: apify/facebook-posts-scraper
    post_actor: apify/facebook-post-scraper
  instagram:
    trends_actor: apify/instagram-scraper
    post_actor: apify/instagram-post-scraper
  youtube:
    trends_actor: streamers/youtube-scraper
    post_actor: streamers/youtube-scraper
