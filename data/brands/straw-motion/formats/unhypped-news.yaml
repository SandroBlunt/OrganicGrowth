# Format: Unhypped News — Straw Motion's one editorial line today.
# A Format is a Brand's editorial line (subject + treatment), NOT a media type (ADR-0009).
# trend-scout reads `sources` (mode + the actual sources) from here; idea-strategist reads `voice`
# and tags every suggested Idea with this Format's slug ("unhypped-news"). `/run-trends straw-motion
# unhypped-news` namespaces its Run output under data/brands/straw-motion/ideas/unhypped-news/<run>/.

name: "Unhypped News"
niche: >-
  Where agentic AI meets generative media: building agents/workflows, generative-media workflows,
  comparing models, AI news, and how the technology is evolving — explained in-depth, in plain terms.

voice: >-
  Easy, no-BS, plain language — never jargon-heavy. Ambitious and confident, the
  way a founder or business owner talks: direct, big-picture, no fluff. Speaks
  to both seasoned builders and total AI beginners without talking down to
  anyone.

# The media SHAPE trend-scout favors when scanning sources — NOT the editorial Format above.
media_focus: reel

sources:
  mode: curated   # peer | curated — Unhypped News digests curated newsletters, not peer Pages

  # Instagram and YouTube Apify actors are now wired (data/brands/straw-motion/seeds.yaml, issue
  # #48), so these peer pages ARE scrapable if this Format is ever switched to peer mode — an
  # editorial/Operator decision, not made by this slice. Kept here (curated mode stays active) for
  # when the Operator wants to try peer-scrape instead of/alongside the curated newsletters below.
  seed_pages:
    - https://www.instagram.com/evolving.ai/
    - https://www.instagram.com/theaifield/
    - https://www.youtube.com/@curiousrefuge

  # Fully public archives (no login/paywall) the Operator already curates and prioritizes. Since
  # this list is non-empty, trend-scout digests these instead of scraping peer Pages via Apify.
  curated_sources:
    - https://ai-weekly.ai/
    - https://newsletter.evolvingai.io/

  keywords: []

  lookback_days: 7
  overperformance_only: true   # not meaningful in curated mode (no peer baseline) — kept for parity

ideas_per_run: 10   # how many Idea briefs to suggest per Run of THIS Format

# Recipe slugs pre-filled at Review for this Format's Ideas (ADR-0009). /review-ideas offers only
# WIRED Recipes (src/recipe/registry.ts, issue #54) — today's single wired Recipe:
default_recipes:
  - character-explainer-with-cast
