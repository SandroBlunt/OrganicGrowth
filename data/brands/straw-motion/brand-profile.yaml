# Brand Profile template — copy this file to data/brands/<slug>/brand-profile.yaml and fill in.
# The idea-strategist treats these as hard brand constraints.

channel:
  name: Straw Motion
  platform: facebook
  url: https://www.facebook.com/profile.php?id=61591885769033

niche: "Where agentic AI meets generative media: building agents/workflows,
  generative-media workflows, comparing models, AI news, and how the technology
  is evolving"
language: en
region: "US"

voice: >-
  Easy, no-BS, plain language — never jargon-heavy. Ambitious and confident, the
  way a founder or business owner talks: direct, big-picture, no fluff. Speaks
  to both seasoned builders and total AI beginners without talking down to
  anyone.

# Straw Motion's editorial line ("Unhypped News") lives at formats/unhypped-news.yaml (FormatStore,
# ADR-0009/0013) — its own niche/voice/sources/mode are canonical for trend-scout/idea-strategist/
# `/run-trends`. The niche/voice above are kept as Brand-wide fallbacks for onboarding/readiness,
# which are not yet Format-aware.

# Brand-safety / hard rules an Idea must respect:
required_cta: "" # Optional: set a verbatim CTA if you enforce one (leave blank otherwise)
required_hashtags: []
banned_words: []
# Also a Brand copy rule, but universal (not a per-Brand toggle, so no YAML field here): every
# Recipe's copy (composed caption/hashtags, plus a News Carousel slide's on-card stat_callout/text)
# is code-enforced dash-free — no em dash "—", en dash "–", or hyphen used as a sentence dash (" - ")
# is ever allowed. Reject-only, never a silent swap (issue #108) — see src/copy/validate.ts and
# src/production-spec/news-carousel-author-checklist.ts.
brand_safety:
  - No medical or 'cure' claims.
  - No dangerous stunts presented as safe.
  - No misleading 'miracle' framing.
