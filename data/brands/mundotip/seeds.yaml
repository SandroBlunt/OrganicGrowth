# Basic parameters the Operator sets for the weekly Trend Research Run (/run-trends).
# trend-scout reads this file. (Production/Space config is read from the Magnific
# Space itself at run time — see docs/adr/0003.)

# Primary 'trending' signal: peer / competitor Pages to scrape.
# A seed entry may be a plain URL string, or a { url, off_niche } object. The object form lets
# the off-niche flag survive YAML parsing so readiness can flag it (a bare # comment cannot).
seed_pages:
  - "https://www.facebook.com/lifehackIG"
  - url: "https://www.facebook.com/tudodereceitasES"   # PT recipes, off es/LATAM niche
    off_niche: true
  - "https://www.facebook.com/ahoralosabesoficial" # suggested: ES life-hacks Page (verified handle)

# Optional topic augmentation (keyword search).
keywords:
  - "trucos caseros"
  - "life hacks"

language: es
region: LATAM
lookback_days: 7           # only consider peer posts from the last N days
format_focus: reel
ideas_per_run: 10
overperformance_only: true # only mine peer posts beating their OWN page baseline

# Apify actors, keyed by platform. trend-scout + performance-tracker use the pair that
# matches the Channel's `platform` (data/brand-profile.yaml). Facebook is wired today;
# Instagram/LinkedIn just need their own actors + a metric mapping into the Performance Score.
apify:
  facebook:
    trends_actor: "apify/facebook-posts-scraper"   # scrapes an account's recent posts
    post_actor:   "apify/facebook-post-scraper"    # scrapes one post's public metrics by URL
  # instagram:
  #   trends_actor: "apify/instagram-scraper"
  #   post_actor:   "apify/instagram-post-scraper"
  # linkedin:
  #   trends_actor: "..."
  #   post_actor:   "..."
