# Who we are. The idea-strategist treats these as hard brand constraints.
# Fill in the TODOs for your Channel.

channel:
  name: MundoTip
  platform: facebook
  url: "https://www.facebook.com/profile.php?id=61587243992554"

niche: "Life hacks, household tips & tricks"
language: es          # content language (Spanish)
region: LATAM

voice: >
  Punchy and curiosity-driven. Short sentences. Open with a surprising claim or a relatable
  problem, deliver one clear payoff, end with a light nudge to engage. Friendly, never preachy.

# MundoTip's one editorial line ("Life Hacks") lives at formats/life-hacks.yaml (FormatStore,
# ADR-0009/0013) — its own niche/voice/sources/mode are canonical for trend-scout/idea-strategist/
# `/run-trends`. The niche/voice above are kept as Brand-wide fallbacks for onboarding/readiness,
# which are not yet Format-aware.

# Brand-safety / hard rules an Idea must respect:
required_cta: ""             # set a verbatim CTA here if you enforce one
required_hashtags: []        # FB hashtags are weak — optional
banned_words: []             # words/claims to never use
brand_safety:
  - "No medical or 'cure' claims."
  - "No dangerous stunts presented as safe."
  - "No misleading 'miracle' framing."

# Production: per-Brand production parameters only. Which Magnific Space a Recipe drives is no
# longer configured here — it lives on the Recipe itself (`src/recipe/registry.ts`'s `space.id`, e.g.
# the wired *Character Explainer with Cast* Recipe's "Organic Character Explainer" cast->clips studio),
# one shared canvas per Recipe for every Brand (ADR-0013/0016). The `production.space_id` /
# `production.space_url` fields that used to live here are RETIRED (issue #88 migration) — the thin
# Producer never reads a Space id from a Brand Profile any more.
production:
  watermark_handle: ""                                # TODO: the @handle stamped on MundoTip's videos (set before rendering)
